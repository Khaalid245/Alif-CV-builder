server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # EduCV Application Logs
  - job_name: educv-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: educv-app
          __path__: /var/log/educv/app.log

  # EduCV Security Logs
  - job_name: educv-security
    static_configs:
      - targets:
          - localhost
        labels:
          job: educv-security
          __path__: /var/log/educv/security.log

  # System Logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog

  # Docker Logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_container_label_logging_jobname']
        target_label: 'job'

pipeline_stages:
  # Parse Django logs
  - match:
      selector: '{job="educv-app"}'
      stages:
        - regex:
            expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) - (?P<level>\w+) - (?P<logger>[\w.]+) - (?P<message>.*)'
        - timestamp:
            source: timestamp
            format: '2006-01-02 15:04:05,000'
        - labels:
            level:
            logger:

  # Parse security logs
  - match:
      selector: '{job="educv-security"}'
      stages:
        - json:
            expressions:
              level: level
              event: event
              ip: ip
              user_agent: user_agent
        - labels:
            level:
            event: