groups:
  - name: educv_alerts
    rules:
      # Application Health
      - alert: ApplicationDown
        expr: up{job="educv-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "EduCV Backend is down"
          description: "The EduCV backend application has been down for more than 1 minute."

      # High Error Rate
      - alert: HighErrorRate
        expr: rate(django_http_responses_total_by_status_view_method{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second for the last 5 minutes."

      # High Response Time
      - alert: HighResponseTime
        expr: django_http_request_duration_seconds{quantile="0.95"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "95th percentile response time is {{ $value }}s for the last 5 minutes."

      # Database Connection Issues
      - alert: DatabaseConnectionHigh
        expr: django_db_connections_total > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High database connections"
          description: "Database connections are at {{ $value }}, approaching limit."

      # System Resources
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for more than 5 minutes."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 85% for more than 5 minutes."

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space low"
          description: "Disk usage is above 90% on {{ $labels.mountpoint }}."

      # PDF Generation Issues
      - alert: PDFGenerationFailures
        expr: rate(educv_pdf_generation_failures_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PDF generation failures"
          description: "PDF generation failure rate is {{ $value }} per second."

      # Authentication Issues
      - alert: HighLoginFailures
        expr: rate(educv_login_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High login failure rate"
          description: "Login failure rate is {{ $value }} per second, possible attack."