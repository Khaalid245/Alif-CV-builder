name: educv
description: "Enterprise University CV Builder"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  hooks_riverpod: ^2.4.9
  flutter_hooks: ^0.20.3

  # HTTP & Networking
  dio: ^5.4.0

  # Navigation
  go_router: ^12.1.3

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Fonts & Icons
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.2
  open_filex: ^4.3.4
  image_picker: ^1.0.4
  url_launcher: ^6.2.1
  flutter_pdfview: ^1.3.2
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/env/.env
    - assets/env/.env.production
    - assets/images/